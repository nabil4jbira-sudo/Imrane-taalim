<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درس الحروف - عمران التعليم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container lesson-page">
        <header>
            <button class="btn-back" onclick="goHome()">← رجوع</button>
            <h1>الحرف رقم <span id="lessonNumber">1</span></h1>
        </header>
        
        <main class="lesson-content">
            <!-- الحرف الرئيسي -->
            <div class="letter-box">
                <p class="label">🔤 الحرف:</p>
                <h2 id="letterArabic" class="big-letter">ا</h2>
                <p id="letterName"></p>
                <p id="letterNameIt" style="color: #666;"></p>
            </div>
            
            <!-- النطق -->
            <div class="pronunciation-box">
                <p class="label">📢 النطق:</p>
                <p id="pronunciation"></p>
                <button class="btn-sound" onclick="speakLetter()">
                    🔊 اسمع نطق الحرف
                </button>
            </div>
            
            <!-- الكلمات من القرآن -->
            <div class="words-box">
                <p class="label">📖 كلمات من القرآن الكريم:</p>
                <div id="wordsContainer"></div>
            </div>
            
            <!-- القصة القرآنية -->
            <div class="story-box">
                <p class="label">📚 قصة قرآنية:</p>
                <p id="storyAr"></p>
                <p id="storyIt" style="color: #666;"></p>
            </div>
            
            <!-- القيمة الإسلامية -->
            <div class="value-box">
                <p class="label">✨ القيمة الإسلامية:</p>
                <p id="valueAr"></p>
                <p id="valueIt" style="color: #666;"></p>
            </div>
            
            <!-- أزرار التنقل -->
            <div class="navigation">
                <button class="btn-nav" onclick="previousLesson()">← السابق</button>
                <button class="btn-nav" onclick="nextLesson()">التالي →</button>
            </div>
        </main>
    </div>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
